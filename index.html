<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hare Krishna Nature Farm | ISKCON Botanical Encyclopedia</title>
    
    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* Premium Nature Palette */
        :root {
            --bg-color: #f2f7f4;
            --primary-dark: #1a3626;
            --primary-green: #2c5e3f;
            --accent-green: #4e8c63;
            --light-sage: #e3ede6;
            --text-main: #2d3b32;
            --text-muted: #647569;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-soft: 0 20px 40px -10px rgba(26, 54, 38, 0.08);
            --shadow-hover: 0 30px 60px -15px rgba(26, 54, 38, 0.15);
        }

        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Elements */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: #d4e8db;
            top: -100px;
            left: -150px;
        }
        body::after {
            width: 600px;
            height: 600px;
            background: #e9f2eb;
            bottom: -200px;
            right: -150px;
        }

        /* Premium Header */
        header {
            padding: 5rem 2rem 4rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -1.5px;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 400;
            color: var(--accent-green);
            margin-bottom: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Search Bar Area */
        .search-wrapper {
            position: relative;
            max-width: 650px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 1.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-green);
            width: 22px;
            height: 22px;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        #search-input {
            width: 100%;
            padding: 1.5rem 2rem 1.5rem 4.5rem;
            font-size: 1.1rem;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--primary-dark);
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            outline: none;
            font-family: 'Poppins', sans-serif;
        }

        #search-input:focus {
            border-color: var(--accent-green);
            box-shadow: var(--shadow-hover);
            background: var(--white);
            transform: translateY(-2px);
        }

        #search-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        #search-input:focus + .search-icon {
            color: var(--primary-dark);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            z-index: 5;
            position: relative;
        }

        /* Loader */
        .status-state {
            text-align: center;
            padding: 5rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid var(--light-sage);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: rotate 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Plants Grid */
        .plants-grid {
            display: grid;
            gap: 3rem;
            grid-template-columns: 1fr; /* Mobile */
        }

        @media (min-width: 768px) {
            .plants-grid {
                grid-template-columns: repeat(2, 1fr); /* Desktop: 2 Cards */
            }
        }

        /* Editorial Plant Card */
        .card {
            background: var(--white);
            border-radius: 28px;
            border: 1px solid var(--light-sage);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow-soft);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-green);
        }

        .card-img-wrapper {
            width: 100%;
            height: 320px;
            overflow: hidden;
            position: relative;
            background: var(--light-sage);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .card-content {
            padding: 2.5rem 2rem;
            position: relative;
            background: var(--white);
        }

        /* Elegant line decorator */
        .card-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 2rem;
            width: 40px;
            height: 3px;
            background: var(--accent-green);
            border-radius: 0 0 4px 4px;
        }

        .plant-name {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 0.2rem;
        }

        .plant-botanical {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--light-sage);
            padding-top: 1.5rem;
            margin-top: 1rem;
        }

        .view-details {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .view-details svg {
            transition: transform 0.3s ease;
        }

        .card:hover .view-details svg {
            transform: translateX(5px);
        }

        .plant-price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-dark);
            background: var(--light-sage);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
        }

        /* No Results Message */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
        }

        .no-results h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
        }

        .no-results p {
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        footer span {
            color: #e25555;
            font-size: 1.2rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Hare Krishna Nature Farm</h1>
            <div class="subtitle">ISKCON Botanical Encyclopedia</div>
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search by name, botanical or vernacular name...">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>
    </header>

    <main>
        <div id="loader" class="status-state">
            <div class="spinner"></div>
            <h2 style="font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 2rem;">Curating Flora...</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Accessing the botanical archives.</p>
        </div>
        <div id="plants-grid" class="plants-grid">
            <!-- Cards will be injected here via JS -->
        </div>
    </main>

    <footer>
        Made with <span>❤️</span> for Hare Krishna Nature Farm
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            const plantsGrid = document.getElementById('plants-grid');
            const loader = document.getElementById('loader');
            
            let allPlants = [];

            // FIXED: Fully URL-encoded SVG placeholder to prevent HTML syntax breaks in the onerror attribute
            const placeholderImg = "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22400%22 viewBox=%220 0 600 400%22%3E%3Crect width=%22600%22 height=%22400%22 fill=%22%23e3ede6%22/%3E%3Cpath d=%22M300 120c-44.1 0-80 35.9-80 80s35.9 80 80 80 80-35.9 80-80-35.9-80-80-80zm0 128c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48z%22 fill=%22%234e8c63%22/%3E%3Cpath d=%22M300 160c-22 0-40 18-40 40s18 40 40 40 40-18 40-40-18-40-40-40z%22 fill=%22%232c5e3f%22/%3E%3C/svg%3E";

            // Fetch JSON Data
            async function fetchPlants() {
                try {
                    await new Promise(resolve => setTimeout(resolve, 600)); 
                    
                    const response = await fetch('plants.json');
                    if (!response.ok) throw new Error('Network response was not ok');
                    
                    const data = await response.json();
                    allPlants = data.plants;
                    
                    loader.style.display = 'none';
                    renderCards(allPlants);
                    
                } catch (error) {
                    console.error("Error loading plant data:", error);
                    
                    let errorMessage = "Failed to load 'plants.json'. Please ensure it exists.";
                    if (window.location.protocol === 'file:') {
                        errorMessage = "<b>Browser Security Block:</b> You cannot read JSON files by double-clicking the HTML file. You MUST open this site using a local server (like the Live Server extension in VS Code).";
                    }

                    loader.innerHTML = `
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#d32f2f" stroke-width="1.5" style="margin: 0 auto 1.5rem;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        <h2 style="font-family: 'Playfair Display', serif; color: #d32f2f; font-size: 2rem;">Archive Unavailable</h2>
                        <p style="color: var(--text-muted); margin-top: 0.5rem; line-height: 1.6;">${errorMessage}</p>`;
                }
            }

            // Render Cards to the DOM
            function renderCards(plants) {
                plantsGrid.innerHTML = ''; // Clear grid

                if (plants.length === 0) {
                    plantsGrid.innerHTML = `
                        <div class="no-results">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--light-sage)" stroke-width="1.5" style="margin-bottom: 1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <h3>No Flora Found</h3>
                            <p>We couldn't find any botanical records matching your search query.</p>
                        </div>`;
                    return;
                }

                plants.forEach((plant, index) => {
                    const card = document.createElement('a');
                    card.href = `plantdetails.html?id=${plant.id}`;
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1}s`;

                    const imageSrc = plant.image && plant.image.trim() !== '' ? plant.image : placeholderImg;

                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            <img src="${imageSrc}" alt="${plant.name}" onerror="this.onerror=null;this.src='${placeholderImg}';">
                        </div>
                        <div class="card-content">
                            <h2 class="plant-name">${plant.name}</h2>
                            <div class="plant-botanical">${plant.botanicalName || 'Botanical name unknown'}</div>
                            
                            <div class="card-footer">
                                <span class="view-details">
                                    Explore 
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                </span>
                                <span class="plant-price">${plant.price || 'N/A'}</span>
                            </div>
                        </div>
                    `;
                    
                    plantsGrid.appendChild(card);
                });
            }

            // Search Functionality
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                const filteredPlants = allPlants.filter(plant => {
                    const nameMatch = plant.name?.toLowerCase().includes(query);
                    const botanicalMatch = plant.botanicalName?.toLowerCase().includes(query);
                    const vernacularMatch = plant.vernacularName?.toLowerCase().includes(query);
                    
                    return nameMatch || botanicalMatch || vernacularMatch;
                });

                renderCards(filteredPlants);
            });

            // Initialize
            fetchPlants();
        });
    </script>
</body>
</html>
